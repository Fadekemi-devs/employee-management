<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Edit Employee</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Name</label>

            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ employee[1] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Email</label>

            <input
                type="email"
                name="email"
                class="form-control"
                value="{{ employee[2] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Department</label>

            <input
                type="text"
                name="department"
                class="form-control"
                value="{{ employee[3] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Position</label>

            <input
                type="text"
                name="position"
                class="form-control"
                value="{{ employee[4] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Salary</label>

            <input
                type="number"
                name="salary"
                class="form-control"
                value="{{ employee[5] }}"
                required>
        </div>

        <button class="btn btn-primary">
            Update Employee
        </button>

        <a href="/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</body>
</html>
