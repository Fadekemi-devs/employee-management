<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container mt-5">

        <div class="text-center mb-4">
            <h1>Employee Management System</h1>
            <p class="text-muted">
                DevOps Capstone Project
            </p>
        </div>

        <div class="card shadow">

            <div class="card-header">
                Employee List
            </div>

            <div class="card-body">

                <form method="POST" action="/add">
                    
                    <div class="row mb-3">

                        <div class="col">
                            <input 
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Name"
                            required>
                        </div>

                        <div class="col">
                            <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Email"
                            required>
                        </div>
                    </div>

                    <div class="row mb-3">

        <div class="col">
            <input
                type="text"
                name="department"
                class="form-control"
                placeholder="Department"
                required>
                    </div>
                  
                    
        <div class="col">
            <input
                type="text"
                name="position"
                class="form-control"
                placeholder="Position"
                required>
        </div>


        <div class="col">
            <input
                type="number"
                name="salary"
                class="form-control"
                placeholder="Salary"
                required>
        </div>

        <button class="btn btn-success">
        Add Employee
    </button>
                </form>
            <div style="overflow-x: auto;"
                <table class="table table-striped">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Position</th>
                            <th>salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>

                        {% for employee in employees %}

                        <tr>
                            <td>{{ employee[0] }}</td>
                            <td>{{ employee[1] }}</td>
                            <td>{{ employee[2] }}</td>
                            <td>{{ employee[3] }}</td>
                            <td>{{ employee[4] }}</td>
                            <td>{{ employee[5]  }}</td>
                            <<td>
    <a href="/edit/{{ employee[0] }}"
       class="btn btn-warning btn-sm">
       Edit
    </a>

    <a href="/delete/{{ employee[0] }}"
       class="btn btn-danger btn-sm">
       Delete
    </a>
</td>
                        </tr>

                        {% endfor %}

                    </tbody>

                </table>
            </div>

            </div>

        </div>

    </div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
