services:
  db:
    image: postgres:17
    container_name: employee-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: employee_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: employee-app-container
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  postgres_data: